<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rukun</title>
    
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/logojkdiy/RUKUN.png?updatedAt=1782969744181">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/logojkdiy/RUKUN.png?updatedAt=1782969744181">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        /* --- Splash Screen Enterprise Style --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .logo {
            width: 160px;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0px 8px 24px rgba(0, 0, 0, 0.05)); 
        }

        /* Progress Bar Premium */
        .progress-container {
            width: 200px;
            height: 3px;
            background-color: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 40%;
            height: 100%;
            background-color: #0f172a; 
            border-radius: 3px;
            position: absolute;
            left: -40%;
            animation: loading 1.6s infinite ease-in-out;
        }

        .loading-text {
            margin-top: 16px;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes loading {
            0% { left: -40%; width: 40%; }
            50% { left: 20%; width: 60%; }
            100% { left: 100%; width: 40%; }
        }

        /* --- Frameless Iframe --- */
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="brand-container">
            <img src="https://ik.imagekit.io/logojkdiy/RUKUN.png?updatedAt=1782969744181" alt="Logo Rukun" class="logo">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div class="loading-text">Memuat Sistem</div>
        </div>
    </div>

    <iframe 
        id="app-frame" 
        src="https://script.google.com/macros/s/AKfycbw8tT9PRf4j6ik9pZXWgFKwAW8THXEbIr8chdnRaZT5BpHs2hGINIwXUEqXDho3PFSm/exec" 
        allowfullscreen>
    </iframe>

    <script>
        // Logika Sinkronisasi Splash Screen dengan Iframe
        document.addEventListener("DOMContentLoaded", () => {
            const splashScreen = document.getElementById('splash-screen');
            const appFrame = document.getElementById('app-frame');

            const hideSplash = () => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.visibility = 'hidden';
                }, 800); 
            };

            appFrame.onload = () => {
                setTimeout(hideSplash, 1200); 
            };

            // Safety fallback
            setTimeout(() => {
                if (splashScreen.style.visibility !== 'hidden') {
                    hideSplash();
                }
            }, 8000);
        });

        // Registrasi Service Worker untuk PWA Enterprise
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker terdaftar sukses.', reg.scope))
                    .catch(err => console.log('Service Worker gagal terdaftar:', err));
            });
        }
    </script>

</body>
</html>
