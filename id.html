<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Rukun</title>
    <!-- Mengimpor font modern dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Reset Dasar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa; /* Warna latar abu-abu sangat muda (enterprise) */
            font-family: 'Inter', sans-serif;
        }

        /* --- Splash Screen Enterprise Style --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* Transisi fade out yang sangat halus */
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        /* Kontainer logo untuk animasi masuk */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Animasi melayang naik dengan halus */
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .logo {
            width: 170px; /* Ukuran proporsional, tidak terlalu besar */
            height: auto;
            margin-bottom: 40px;
            /* Memberikan bayangan super halus agar logo tidak terlihat flat */
            filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.04)); 
        }

        /* --- Sleek Progress Bar (Indikator Loading) --- */
        .progress-container {
            width: 220px;
            height: 3px;
            background-color: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 30%;
            height: 100%;
            background-color: #0f172a; /* Warna gelap elegan (bisa diganti kode warna corporate Anda) */
            border-radius: 3px;
            position: absolute;
            left: -30%;
            animation: loading 1.8s infinite ease-in-out;
        }

        .loading-text {
            margin-top: 16px;
            font-size: 12px;
            color: #64748b;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Keyframes untuk animasi */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; }
            50% { left: 30%; width: 70%; }
            100% { left: 100%; width: 30%; }
        }

        /* --- Iframe (Frameless) --- */
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- Area Splash Screen -->
    <div id="splash-screen">
        <div class="brand-container">
            <img src="https://ik.imagekit.io/logojkdiy/RUKUN.png?updatedAt=1782969744181" alt="Logo Rukun" class="logo">
            
            <!-- Progress Bar Loading -->
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            
            <div class="loading-text">Memuat Sistem...</div>
        </div>
    </div>

    <!-- Area Aplikasi (Iframe) -->
    <iframe 
        id="app-frame" 
        src="https://script.google.com/macros/s/AKfycbw8tT9PRf4j6ik9pZXWgFKwAW8THXEbIr8chdnRaZT5BpHs2hGINIwXUEqXDho3PFSm/exec" 
        allowfullscreen>
    </iframe>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const splashScreen = document.getElementById('splash-screen');
            const appFrame = document.getElementById('app-frame');

            const hideSplash = () => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.visibility = 'hidden';
                }, 800); 
            };

            // Menunggu iframe selesai dimuat
            appFrame.onload = () => {
                // Memberikan waktu ekstra 1.5 detik agar animasi fadeUp selesai terlihat sempurna
                setTimeout(hideSplash, 1500); 
            };

            // Fallback timeout
            setTimeout(() => {
                if (splashScreen.style.visibility !== 'hidden') {
                    hideSplash();
                }
            }, 8000);
        });
    </script>

</body>
</html>
